server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Standalone demo: upstream `backend` is not on this Compose network (see cursor-webinar-sec
  # full stack). Avoid nginx startup failure from missing resolver host.
  location /api/ {
    default_type application/json;
    return 503 '{"error":"Standalone demo has no backend. Use cursor-webinar-sec/docker-compose.yaml for full API."}';
  }
}

